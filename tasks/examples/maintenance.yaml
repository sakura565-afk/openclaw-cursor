name: maintenance-sweep
description: Run routine maintenance operations.
metadata:
  owner: platform-ops
  environment: staging
steps:
  - name: check-python-version
    action: shell.run
    parameters:
      command: python3 --version
  - name: validate-script-permissions
    action: shell.run
    parameters:
      command: test -x ./scripts/bootstrap.sh && test -x ./scripts/healthcheck.sh
  - name: run-healthcheck
    action: shell.run
    parameters:
      command: ./scripts/healthcheck.sh
