name: Nightly OpenClaw Automation

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  run-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute nightly maintenance task
        run: |
          python scripts/run_task.py --task tasks/examples/maintenance.yaml
