name: Image Processing Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  image-pipeline:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run media tool tests
        run: pytest -q

      - name: Process sample images
        run: |
          python media_tool.py \
            --input-dir tests/fixtures \
            --output-dir artifacts/processed-images \
            --summary artifacts/image-summary.md

      - name: Publish markdown summary
        run: cat artifacts/image-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload processed image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: processed-images-py${{ matrix.python-version }}
          path: |
            artifacts/processed-images/
            artifacts/image-summary.md
          if-no-files-found: error
