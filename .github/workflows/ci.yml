name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "cursor/**"

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall src scripts

      - name: Dry run maintenance task
        run: python scripts/run_task.py --task tasks/examples/maintenance.yaml --dry-run

      - name: Dry run image pipeline task
        run: python scripts/run_task.py --task tasks/examples/image_pipeline.yaml --dry-run
